trigger: none
pr: none

parameters:
- name: projectPath
  displayName: Project Path
  type: string
  default: infra\rg-test
  values:
  - infra\rg-test
  - infra\network
  - infra\data

- name: environment
  displayName: Environment
  type: string
  default: dev
  values:
  - dev
  - sit
  - uat
  - prod

- name: operation
  displayName: Operation
  type: string
  default: deploy
  values:
  - deploy
  - delete

- name: runPlan
  displayName: Run Terraform Plan
  type: boolean
  default: true

- name: runApply
  displayName: Execute Apply/Destroy
  type: boolean
  default: false

variables:
# =========================
# Environment Variable Groups
# 请先在 Library 中创建这些 group，并授权给该 YAML pipeline
# =========================
- ${{ if eq(parameters.environment, 'dev') }}:
  - group: vg-global-dev
- ${{ if eq(parameters.environment, 'sit') }}:
  - group: vg-global-sit
- ${{ if eq(parameters.environment, 'uat') }}:
  - group: vg-global-uat
- ${{ if eq(parameters.environment, 'prod') }}:
  - group: vg-global-prod

# =========================
# Environment -> Service Connection / Subscription / tfvars
# =========================
- ${{ if eq(parameters.environment, 'dev') }}:
  - name: serviceConnection
    value: 'sc-tf-dev'
  - name: subscriptionId
    value: '11111111-1111-1111-1111-111111111111'
  - name: tfVarsRelativePath
    value: 'env\dev.tfvars'
  - name: stateKeyPrefix
    value: 'dev'

- ${{ if eq(parameters.environment, 'sit') }}:
  - name: serviceConnection
    value: 'sc-tf-sit'
  - name: subscriptionId
    value: '22222222-2222-2222-2222-222222222222'
  - name: tfVarsRelativePath
    value: 'env\sit.tfvars'
  - name: stateKeyPrefix
    value: 'sit'

- ${{ if eq(parameters.environment, 'uat') }}:
  - name: serviceConnection
    value: 'sc-tf-uat'
  - name: subscriptionId
    value: '33333333-3333-3333-3333-333333333333'
  - name: tfVarsRelativePath
    value: 'env\uat.tfvars'
  - name: stateKeyPrefix
    value: 'uat'

- ${{ if eq(parameters.environment, 'prod') }}:
  - name: serviceConnection
    value: 'sc-tf-prod'
  - name: subscriptionId
    value: '44444444-4444-4444-4444-444444444444'
  - name: tfVarsRelativePath
    value: 'env\prod.tfvars'
  - name: stateKeyPrefix
    value: 'prod'

# =========================
# 这些变量建议放进对应环境的 variable group
# 这里放默认值，避免没有 group 时 YAML 直接报未定义
# =========================
- name: tfStateResourceGroup
  value: 'rg-tfstate'
- name: tfStateStorageAccount
  value: 'satfstate001'
- name: tfStateContainer
  value: 'tfstate'

pool:
  name: 'Your-Windows-Agent-Pool'

stages:
- stage: Terraform
  displayName: Terraform_${{ parameters.environment }}_${{ parameters.operation }}
  jobs:
  - job: RunTerraform
    displayName: Validate_Plan_Execute
    steps:
    - checkout: self

    - powershell: |
        Write-Host "Project Path       : ${{ parameters.projectPath }}"
        Write-Host "Environment        : ${{ parameters.environment }}"
        Write-Host "Operation          : ${{ parameters.operation }}"
        Write-Host "Run Plan           : ${{ parameters.runPlan }}"
        Write-Host "Run Apply          : ${{ parameters.runApply }}"
        Write-Host "Service Connection : $(serviceConnection)"
        Write-Host "Subscription Id    : $(subscriptionId)"
        Write-Host "tfvars file        : $(tfVarsRelativePath)"
        Write-Host "tfstate rg         : $(tfStateResourceGroup)"
        Write-Host "tfstate account    : $(tfStateStorageAccount)"
        Write-Host "tfstate container  : $(tfStateContainer)"
      displayName: Show runtime selections

    - powershell: |
        $ErrorActionPreference = 'Stop'
        terraform version
        az version
      displayName: Check Terraform and Azure CLI

    - task: AzureCLI@2
      displayName: Validate / Plan / Execute Terraform
      inputs:
        azureSubscription: '$(serviceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        addSpnToEnvironment: true
        inlineScript: |
          $ErrorActionPreference = 'Stop'

          $tfRoot      = '${{ parameters.projectPath }}'
          $tfVarsFile  = '$(tfVarsRelativePath)'
          $operation   = '${{ parameters.operation }}'
          $runPlan     = '${{ parameters.runPlan }}'
          $runApply    = '${{ parameters.runApply }}'

          if (-not (Test-Path $tfRoot)) {
            throw "Terraform root directory not found: $tfRoot"
          }

          $fullTfVarsPath = Join-Path $tfRoot $tfVarsFile
          if (-not (Test-Path $fullTfVarsPath)) {
            throw "tfvars file not found: $fullTfVarsPath"
          }

          Write-Host "Switching subscription..."
          az account set --subscription "$(subscriptionId)"

          Write-Host "Current Azure account:"
          az account show

          # Service connection 注入的 SPN 信息映射为 Terraform Azure 认证变量
          $env:ARM_CLIENT_ID       = $env:servicePrincipalId
          $env:ARM_CLIENT_SECRET   = $env:servicePrincipalKey
          $env:ARM_TENANT_ID       = $env:tenantId
          $env:ARM_SUBSCRIPTION_ID = "$(subscriptionId)"

          $safeTfRoot = $tfRoot.Replace('\', '-').Replace('/', '-')
          $tfStateKey = "$(stateKeyPrefix)-$safeTfRoot.tfstate"

          Write-Host "Terraform init..."
          terraform -chdir="$tfRoot" init `
            -backend-config="resource_group_name=$(tfStateResourceGroup)" `
            -backend-config="storage_account_name=$(tfStateStorageAccount)" `
            -backend-config="container_name=$(tfStateContainer)" `
            -backend-config="key=$tfStateKey"

          Write-Host "Terraform fmt check..."
          terraform -chdir="$tfRoot" fmt -check -recursive

          Write-Host "Terraform validate..."
          terraform -chdir="$tfRoot" validate

          if ($runPlan -eq "True" -or $runPlan -eq "true") {
            if ($operation -eq "deploy") {
              Write-Host "Running terraform plan for deploy..."
              terraform -chdir="$tfRoot" plan `
                -var-file="$tfVarsFile" `
                -out=tfplan
            }
            elseif ($operation -eq "delete") {
              Write-Host "Running terraform plan for destroy..."
              terraform -chdir="$tfRoot" plan `
                -destroy `
                -var-file="$tfVarsFile" `
                -out=tfplan-destroy
            }
            else {
              throw "Unsupported operation: $operation"
            }
          }

          if ($runApply -eq "True" -or $runApply -eq "true") {
            if ($operation -eq "deploy") {
              $planPath = Join-Path $tfRoot 'tfplan'
              if (-not (Test-Path $planPath)) {
                throw "Plan file not found: $planPath. Run plan first."
              }

              Write-Host "Executing terraform apply..."
              terraform -chdir="$tfRoot" apply -auto-approve tfplan
            }
            elseif ($operation -eq "delete") {
              $destroyPlanPath = Join-Path $tfRoot 'tfplan-destroy'

              if (Test-Path $destroyPlanPath) {
                Write-Host "Executing terraform apply for destroy plan..."
                terraform -chdir="$tfRoot" apply -auto-approve tfplan-destroy
              }
              else {
                Write-Host "Destroy plan file not found, fallback to terraform destroy..."
                terraform -chdir="$tfRoot" destroy `
                  -auto-approve `
                  -var-file="$tfVarsFile"
              }
            }
            else {
              throw "Unsupported operation: $operation"
            }
          }