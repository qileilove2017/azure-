trigger: none
pr: none

parameters:
- name: project
  type: string
  default: app1
  values:
  - app1
  - app2
  - network

- name: environment
  type: string
  default: dev
  values:
  - dev
  - sit
  - uat
  - prod

- name: terraformRoot
  type: string
  default: infra\app
  values:
  - infra\app
  - infra\network
  - infra\data

- name: operation
  type: string
  default: deploy
  values:
  - deploy
  - delete

- name: runPlan
  type: boolean
  default: true

- name: runApply
  type: boolean
  default: false

variables:
# ===== Variable Groups =====
- ${{ if eq(parameters.environment, 'dev') }}:
  - group: vg-global-dev
- ${{ if eq(parameters.environment, 'sit') }}:
  - group: vg-global-sit
- ${{ if eq(parameters.environment, 'uat') }}:
  - group: vg-global-uat
- ${{ if eq(parameters.environment, 'prod') }}:
  - group: vg-global-prod

- ${{ if and(eq(parameters.project, 'app1'), eq(parameters.environment, 'dev')) }}:
  - group: vg-app1-dev
- ${{ if and(eq(parameters.project, 'app1'), eq(parameters.environment, 'sit')) }}:
  - group: vg-app1-sit
- ${{ if and(eq(parameters.project, 'app1'), eq(parameters.environment, 'uat')) }}:
  - group: vg-app1-uat
- ${{ if and(eq(parameters.project, 'app1'), eq(parameters.environment, 'prod')) }}:
  - group: vg-app1-prod

- ${{ if and(eq(parameters.project, 'app2'), eq(parameters.environment, 'dev')) }}:
  - group: vg-app2-dev
- ${{ if and(eq(parameters.project, 'app2'), eq(parameters.environment, 'prod')) }}:
  - group: vg-app2-prod

# ===== Environment mapping =====
- ${{ if eq(parameters.environment, 'dev') }}:
  - name: serviceConnection
    value: 'sc-tf-dev'
  - name: subscriptionId
    value: '11111111-1111-1111-1111-111111111111'
  - name: tfVarsRelativePath
    value: 'env\dev.tfvars'
  - name: stateKeyPrefix
    value: 'dev'

- ${{ if eq(parameters.environment, 'sit') }}:
  - name: serviceConnection
    value: 'sc-tf-sit'
  - name: subscriptionId
    value: '22222222-2222-2222-2222-222222222222'
  - name: tfVarsRelativePath
    value: 'env\sit.tfvars'
  - name: stateKeyPrefix
    value: 'sit'

- ${{ if eq(parameters.environment, 'uat') }}:
  - name: serviceConnection
    value: 'sc-tf-uat'
  - name: subscriptionId
    value: '33333333-3333-3333-3333-333333333333'
  - name: tfVarsRelativePath
    value: 'env\uat.tfvars'
  - name: stateKeyPrefix
    value: 'uat'

- ${{ if eq(parameters.environment, 'prod') }}:
  - name: serviceConnection
    value: 'sc-tf-prod'
  - name: subscriptionId
    value: '44444444-4444-4444-4444-444444444444'
  - name: tfVarsRelativePath
    value: 'env\prod.tfvars'
  - name: stateKeyPrefix
    value: 'prod'

pool:
  name: 'Your-Windows-Agent-Pool'

steps:
- checkout: self

- task: AzureCLI@2
  displayName: Validate Plan Execute Terraform
  inputs:
    azureSubscription: '$(serviceConnection)'
    scriptType: 'ps'
    scriptLocation: 'inlineScript'
    addSpnToEnvironment: true
    inlineScript: |
      $ErrorActionPreference = 'Stop'

      $tfRoot = '${{ parameters.terraformRoot }}'
      $tfVarsFile = '$(tfVarsRelativePath)'
      $operation = '${{ parameters.operation }}'
      $runPlan = '${{ parameters.runPlan }}'
      $runApply = '${{ parameters.runApply }}'

      az account set --subscription "$(subscriptionId)"
      az account show

      $env:ARM_CLIENT_ID       = $env:servicePrincipalId
      $env:ARM_CLIENT_SECRET   = $env:servicePrincipalKey
      $env:ARM_TENANT_ID       = $env:tenantId
      $env:ARM_SUBSCRIPTION_ID = "$(subscriptionId)"

      terraform -chdir="$tfRoot" init
      terraform -chdir="$tfRoot" fmt -check -recursive
      terraform -chdir="$tfRoot" validate

      if ($runPlan -eq "True" -or $runPlan -eq "true") {
        if ($operation -eq "deploy") {
          terraform -chdir="$tfRoot" plan -var-file="$tfVarsFile" -out=tfplan
        }
        elseif ($operation -eq "delete") {
          terraform -chdir="$tfRoot" plan -destroy -var-file="$tfVarsFile" -out=tfplan-destroy
        }
      }

      if ($runApply -eq "True" -or $runApply -eq "true") {
        if ($operation -eq "deploy") {
          terraform -chdir="$tfRoot" apply -auto-approve tfplan
        }
        elseif ($operation -eq "delete") {
          terraform -chdir="$tfRoot" apply -auto-approve tfplan-destroy
        }
      }