parameters:
- name: projectPath
  type: string

- name: environment
  type: string

- name: windowsAgentPool
  type: string

- name: dependsOnStage
  type: string
  default: Terraform_Plan

stages:
- stage: Terraform_Apply
  displayName: Terraform Apply - ${{ parameters.environment }}
  dependsOn: ${{ parameters.dependsOnStage }}
  condition: succeeded()

  jobs:
  - job: Apply
    displayName: Terraform Apply
    pool:
      name: ${{ parameters.windowsAgentPool }}

    steps:
    - checkout: self

    - download: current
      artifact: terraform-plan
      displayName: Download Terraform Plan Artifact

    - task: AzureCLI@2
      displayName: Terraform Apply
      inputs:
        azureSubscription: '$(serviceConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        addSpnToEnvironment: true
        inlineScript: |
          $ErrorActionPreference = 'Stop'

          $tfRoot = '${{ parameters.projectPath }}'
          $tfVarsFile = '$(tfVarsRelativePath)'
          $planFile = "$(Pipeline.Workspace)\terraform-plan\tfplan"

          if (-not (Test-Path $tfRoot)) {
            throw "Terraform root directory not found: $tfRoot"
          }

          if (-not (Test-Path $planFile)) {
            throw "Terraform plan file not found: $planFile"
          }

          az account set --subscription "$(subscriptionId)"
          az account show

          $env:ARM_CLIENT_ID       = $env:servicePrincipalId
          $env:ARM_CLIENT_SECRET   = $env:servicePrincipalKey
          $env:ARM_TENANT_ID       = $env:tenantId
          $env:ARM_SUBSCRIPTION_ID = "$(subscriptionId)"

          $safeTfRoot = $tfRoot.Replace('\', '-').Replace('/', '-')
          $tfStateKey = "$(stateKeyPrefix)-$safeTfRoot.tfstate"

          terraform -chdir="$tfRoot" init `
            -backend-config="resource_group_name=$(tfStateResourceGroup)" `
            -backend-config="storage_account_name=$(tfStateStorageAccount)" `
            -backend-config="container_name=$(tfStateContainer)" `
            -backend-config="key=$tfStateKey"

          Write-Host "Applying terraform plan..."
          terraform -chdir="$tfRoot" apply -auto-approve "$planFile"