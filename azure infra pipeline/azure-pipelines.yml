trigger: none
pr: none

parameters:
- name: projectPath
  displayName: Project Path
  type: string
  default: infra\rg-test
  values:
  - infra\rg-test
  - infra\network
  - infra\data

- name: environment
  displayName: Environment
  type: string
  default: dev
  values:
  - dev
  - sit
  - uat
  - prod

- name: operation
  displayName: Operation
  type: string
  default: deploy
  values:
  - deploy
  - delete

- name: runApply
  displayName: Execute Apply/Destroy
  type: boolean
  default: false

variables:
# =========================
# Environment Variable Groups
# =========================
- ${{ if eq(parameters.environment, 'dev') }}:
  - group: vg-global-dev

- ${{ if eq(parameters.environment, 'sit') }}:
  - group: vg-global-sit

- ${{ if eq(parameters.environment, 'uat') }}:
  - group: vg-global-uat

- ${{ if eq(parameters.environment, 'prod') }}:
  - group: vg-global-prod

# =========================
# Environment Mapping
# =========================
- ${{ if eq(parameters.environment, 'dev') }}:
  - name: serviceConnection
    value: 'sc-tf-dev'
  - name: subscriptionId
    value: '11111111-1111-1111-1111-111111111111'
  - name: tfVarsRelativePath
    value: 'env\dev.tfvars'
  - name: stateKeyPrefix
    value: 'dev'

- ${{ if eq(parameters.environment, 'sit') }}:
  - name: serviceConnection
    value: 'sc-tf-sit'
  - name: subscriptionId
    value: '22222222-2222-2222-2222-222222222222'
  - name: tfVarsRelativePath
    value: 'env\sit.tfvars'
  - name: stateKeyPrefix
    value: 'sit'

- ${{ if eq(parameters.environment, 'uat') }}:
  - name: serviceConnection
    value: 'sc-tf-uat'
  - name: subscriptionId
    value: '33333333-3333-3333-3333-333333333333'
  - name: tfVarsRelativePath
    value: 'env\uat.tfvars'
  - name: stateKeyPrefix
    value: 'uat'

- ${{ if eq(parameters.environment, 'prod') }}:
  - name: serviceConnection
    value: 'sc-tf-prod'
  - name: subscriptionId
    value: '44444444-4444-4444-4444-444444444444'
  - name: tfVarsRelativePath
    value: 'env\prod.tfvars'
  - name: stateKeyPrefix
    value: 'prod'

# =========================
# Default backend config
# 建议实际放在 variable group 中
# =========================
- name: tfStateResourceGroup
  value: 'rg-tfstate'

- name: tfStateStorageAccount
  value: 'satfstate001'

- name: tfStateContainer
  value: 'tfstate'

stages:
- template: templates/tf-plan.yml
  parameters:
    projectPath: ${{ parameters.projectPath }}
    environment: ${{ parameters.environment }}
    operation: ${{ parameters.operation }}
    windowsAgentPool: 'Your-Windows-Agent-Pool'

- ${{ if and(eq(parameters.operation, 'deploy'), eq(parameters.runApply, true)) }}:
  - template: templates/tf-apply.yml
    parameters:
      projectPath: ${{ parameters.projectPath }}
      environment: ${{ parameters.environment }}
      windowsAgentPool: 'Your-Windows-Agent-Pool'
      dependsOnStage: Terraform_Plan

- ${{ if and(eq(parameters.operation, 'delete'), eq(parameters.runApply, true)) }}:
  - template: templates/tf-destroy.yml
    parameters:
      projectPath: ${{ parameters.projectPath }}
      environment: ${{ parameters.environment }}
      windowsAgentPool: 'Your-Windows-Agent-Pool'
      dependsOnStage: Terraform_Plan